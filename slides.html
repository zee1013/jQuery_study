<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slide</title>
    <link rel="stylesheet" href="css/slides.css">
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/slides.js"></script>
</head>
<body>
    <!-- 좌우 슬라이드 -->
     <h2>1. 좌우 슬라이드</h2>
     <div class="slide-wrap">
        <ul class="slide-list">
            <li><img src="https://picsum.photos/600/400?random=1" alt=""></li>
            <li><img src="https://picsum.photos/600/400?random=2" alt=""></li>
            <li><img src="https://picsum.photos/600/400?random=3" alt=""></li>
        </ul>
     </div>

    <!-- 상하 슬라이드 -->
     <h2>2. 상하 슬라이드</h2>
     <div class="slide-wrap">
        <div class="slideUp-box"><ul class="slide-list-up">
            <li><img src="https://picsum.photos/600/400?random=4" alt=""></li>
            <li><img src="https://picsum.photos/600/400?random=5" alt=""></li>
            <li><img src="https://picsum.photos/600/400?random=6" alt=""></li>
        </ul></div>
        
     </div>

     <!-- 페이드인 페이드아웃 -->
      <h2>3. 페이드인 페이드아웃</h2>
     <div class="slide-wrap">
        <ul class="slide-fade">
            <li><img src="https://picsum.photos/600/400?random=7" alt=""></li>
            <li><img src="https://picsum.photos/600/400?random=8" alt=""></li>
            <li><img src="https://picsum.photos/600/400?random=9" alt=""></li>
        </ul>
     </div>
</body>
</html>
