<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animate</title>
    <style>
        button{
            position: relative;
            border: 3px solid rosybrown;
            border-radius: 30px;
            padding: 10px;
            font-weight: bold;
            color: royalblue;
            background-color: pink;
            cursor: pointer;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: rgb(255, 251, 202);
        }
        .btns{
            position: relative;
            top: 300px;
        }
    </style>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/jq05.js"></script>
</head>
<body>
    <div class="box">move</div>
    <div class="btns">
        <button class="move">이동</button>
    <button class="resize">크기변경</button>
    <button class="fade">페이드</button>
    <button class="all">모든 애니메이션</button>

    </div>
    
</body>
</html>
