<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>함수</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: pink;
        }
    </style>
    <script src="js/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h1 id="hi">하이</h1>

        function hi(){
            console.log("안농");
            
        }
        hi()
        function changeTxt(){
            $("#hi").text("안농")
        }
        changeTxt()
        function hideBox(){
            $(".box").hide()
        }
        hideBox()
    </script>
</body>
</html>
